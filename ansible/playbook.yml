---
- name: Bootstrap MacBook
  hosts: local
  gather_facts: true
  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Require macOS
      ansible.builtin.fail:
        msg: "This playbook only supports macOS (detected {{ ansible_system }})."
      when: ansible_system != 'Darwin'

  tasks:
    - name: Ensure Homebrew is available
      ansible.builtin.import_tasks: tasks/homebrew.yml
      tags: [brew, bootstrap]

    - name: Install Oh My Zsh
      ansible.builtin.import_tasks: tasks/oh_my_zsh.yml
      tags: [omz, shell]

    - name: Install Oh My Zsh plugins
      ansible.builtin.import_tasks: tasks/zsh_plugins.yml
      tags: [omz, shell]

    - name: Create developer directories
      ansible.builtin.import_tasks: tasks/directories.yml
      tags: [dirs]

    - name: Symlink dotfiles
      ansible.builtin.import_tasks: tasks/dotfiles.yml
      tags: [dotfiles, shell]

    - name: Apply macOS defaults
      ansible.builtin.import_tasks: tasks/macos_defaults.yml
      tags: [macos, defaults]

    - name: Configure git
      ansible.builtin.import_tasks: tasks/git_config.yml
      tags: [git]

  handlers:
    - name: Restart Dock
      ansible.builtin.command: killall Dock
      changed_when: false
      failed_when: false
