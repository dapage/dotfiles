---
# user.name / user.email:
#   - If already set in ~/.gitconfig and no override is passed, leave alone.
#   - Pass `-e git_user_name="Foo Bar" -e git_user_email="foo@bar"` to update.
#   - Prompt only when unset and no override given.

- name: Read current git user.name
  ansible.builtin.command: git config --global --default "" user.name
  register: current_git_user_name
  changed_when: false

- name: Read current git user.email
  ansible.builtin.command: git config --global --default "" user.email
  register: current_git_user_email
  changed_when: false

- name: Prompt for git user.name (unset and no override)
  ansible.builtin.pause:
    prompt: "Git user.name"
  register: prompted_git_user_name
  when:
    - (git_user_name | default('') | trim) == ''
    - (current_git_user_name.stdout | trim) == ''

- name: Prompt for git user.email (unset and no override)
  ansible.builtin.pause:
    prompt: "Git user.email"
  register: prompted_git_user_email
  when:
    - (git_user_email | default('') | trim) == ''
    - (current_git_user_email.stdout | trim) == ''

- name: Resolve desired git user.name
  ansible.builtin.set_fact:
    desired_git_user_name: >-
      {{ (git_user_name | default('') | trim)
         if (git_user_name | default('') | trim) != ''
         else (prompted_git_user_name.user_input | default('') | trim) }}

- name: Resolve desired git user.email
  ansible.builtin.set_fact:
    desired_git_user_email: >-
      {{ (git_user_email | default('') | trim)
         if (git_user_email | default('') | trim) != ''
         else (prompted_git_user_email.user_input | default('') | trim) }}

- name: Set git user.name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ desired_git_user_name }}"
  when: desired_git_user_name | length > 0

- name: Set git user.email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ desired_git_user_email }}"
  when: desired_git_user_email | length > 0

- name: Set git init.defaultBranch
  community.general.git_config:
    name: init.defaultBranch
    scope: global
    value: "{{ git_default_branch }}"

- name: Set git pull.rebase
  community.general.git_config:
    name: pull.rebase
    scope: global
    value: "{{ git_pull_rebase }}"
