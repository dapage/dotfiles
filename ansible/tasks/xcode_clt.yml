---
- name: Check for Xcode Command Line Tools
  ansible.builtin.stat:
    path: /Library/Developer/CommandLineTools/usr/bin/git
  register: xcode_clt

- name: Trigger Xcode Command Line Tools install
  ansible.builtin.command: xcode-select --install
  register: xcode_install
  changed_when: xcode_install.rc == 0
  failed_when: false
  when: not xcode_clt.stat.exists

- name: Wait for Xcode Command Line Tools to finish installing
  ansible.builtin.stat:
    path: /Library/Developer/CommandLineTools/usr/bin/git
  register: xcode_clt_wait
  until: xcode_clt_wait.stat.exists
  retries: 60
  delay: 10
  when: not xcode_clt.stat.exists
