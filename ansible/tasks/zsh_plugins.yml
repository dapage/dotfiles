---
# Plugins load into every shell, so a compromise of any of these repos
# persists across all sessions. Each `version` is a commit SHA — bump
# deliberately when you want to take upstream changes.
- name: Clone third-party Oh My Zsh plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ ansible_env.ZSH_CUSTOM | default(ansible_env.HOME + '/.oh-my-zsh/custom', true) }}/plugins/{{ item.name }}"
    version: "{{ item.version }}"
    depth: 1
    update: false
  loop:
    - name: zsh-autosuggestions
      repo: https://github.com/zsh-users/zsh-autosuggestions
      version: 85919cd1ffa7d2d5412f6d3fe437ebdbeeec4fc5
    - name: zsh-syntax-highlighting
      repo: https://github.com/zsh-users/zsh-syntax-highlighting
      version: 1d85c692615a25fe2293bdd44b34c217d5d2bf04
    - name: zsh-completions
      repo: https://github.com/zsh-users/zsh-completions
      version: dbaeafd96c3fd9d84c8540f6d87c6b37c4c9173d
    - name: zsh-history-substring-search
      repo: https://github.com/zsh-users/zsh-history-substring-search
      version: 14c8d2e0ffaee98f2df9850b19944f32546fdea5
    - name: zsh-interactive-cd
      repo: https://github.com/changyuheng/zsh-interactive-cd
      version: e7d4802aa526ec069dafec6709549f4344ce9d4a
  loop_control:
    label: "{{ item.name }}"
