name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and linters
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible syntax-check
        working-directory: ansible
        run: ansible-playbook playbook.yml --syntax-check

      - name: ansible-lint
        working-directory: ansible
        run: ansible-lint playbook.yml

      - name: yamllint
        run: yamllint ansible/ .github/

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "bootstrap.sh ansible/tests/integration/run.sh"
          ignore_paths: "install.sh update.sh"
